name: Android Build (Unified)

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: List Files (Debug)
      run: ls -R

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.6'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get
      working-directory: flutter_application_1

    - name: Build APK (Release)
      run: flutter build apk --release --no-tree-shake-icons
      working-directory: flutter_application_1

    - name: Build App Bundle (Release)
      run: flutter build appbundle --release --no-tree-shake-icons
      working-directory: flutter_application_1

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          flutter_application_1/build/app/outputs/flutter-apk/app-release.apk
          flutter_application_1/build/app/outputs/bundle/release/app-release.aab
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
